<!DOCTYPE html>
<html lang="es">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

 </head>
  <body>
    <!-- Barra de Navegación -->
    <nav>
        <ul>
            <li><a href="../somos.html">¿Quiénes somos?</a></li>
            <li><a href="../index.html">Nuestros servicios</a></li>
            <li><a href="contacto.html">Contáctanos</a></li>
        </ul>
    </nav>

    <div class="form-container">
        <h2>Contáctanos</h2>
        <form id="formulario" novalidate>
            <div class="form-field">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" placeholder="Ingrese su nombre completo" required>
            </div>

            <div class="form-field">
                <label for="celular">Celular</label>
                <input type="text" id="celular" placeholder="Ej: 912345678" required>
            </div>

            <div class="form-field">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" placeholder="correo@ejemplo.com" required>
            </div>

            <!-- Campos añadidos según requerimiento -->
            <div class="form-field">
                <label for="pais">País</label>
                <input type="text" id="pais" placeholder="Ingrese su país" required>
            </div>

            <div class="form-field">
                <label for="ciudad">Ciudad</label>
                <input type="text" id="ciudad" placeholder="Ingrese su ciudad" required>
            </div>

            <div class="form-field">
                <label for="consulta">Consulta</label>
                <textarea id="consulta" placeholder="Escribe tu consulta aquí..." required></textarea>
            </div>

            <div class="form-actions">
                <!-- Se usa type="button" para manejar la validación con la función específica requerida -->
                <button type="button" class="submit-button" onclick="validarFormulario()">Enviar datos</button>
                <p id="Mensaje" aria-live="polite"></p>
            </div>
        </form>
    </div>
</body>
<script src="scripts.js"></script>
</body>
</html>
